<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mente Organizada - Configurações</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .config-box {
            background: white;
            padding: 30px;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            margin-top: 30px;
            max-width: 600px;
        }
        .config-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .config-group label {
            font-weight: 600;
            color: #0b3c5d;
        }
        .config-group input, .config-group select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-family: inherit;
            font-size: 0.95rem;
        }
        .btn-salvar {
            background-color: #32a852;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-salvar:hover {
            background-color: #288441;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <!-- Barra Lateral Ativa em Configurações -->
        <aside class="sidebar">
            <div class="logo-area">
                <div class="notebook-icon">📖</div>
                <h2>Mente Organizada</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html">📅 Painel Geral</a>
                <a href="estatisticas.html">📊 Estatísticas</a>
                <a href="conquistas.html">🏆 Conquistas</a>
                <a href="configuracoes.html" class="active">⚙️ Configurações</a>
            </nav>
        </aside>

        <!-- Conteúdo Principal -->
        <main class="main-content">
            <header class="main-header">
                <div class="header-titles">
                    <h1>Configurações do Perfil ⚙️</h1>
                    <p class="subtitle">Gerencie suas preferências de estudo e dados da conta.</p>
                </div>
            </header>

            <!-- Formulário de Configurações -->
            <section class="config-box">
                <div class="config-group">
                    <label for="nomeAluno">Nome do Estudante:</label>
                    <input type="text" id="nomeAluno" value="Aluno Demonstração">
                </div>
                <div class="config-group">
                    <label for="metaDias">Meta de Estudos Mensal:</label>
                    <select id="metaDias">
                        <option value="10">10 dias no mês</option>
                        <option value="15">15 dias no mês</option>
                        <option value="20" selected>20 dias no mês</option>
                        <option value="31">Todos os dias (31 dias)</option>
                    </select>
                </div>
                <button class="btn-salvar" onclick="alert('Configurações salvas localmente!')">Salvar Alterações</button>
            </section>
        </main>
    </div>

</body>
</html>
