<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenteOrganizada - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="logo-container">
            <div class="logo-icon">
                <span class="brain">🧠</span>
                <span class="book">📖</span>
            </div>
            <h1>MenteOrganizada</h1>
            <p class="school-tag">CEEP Cleuza Eleuza Maria</p>
        </div>

        <form id="loginForm">
            <div class="input-group">
                <label for="email">E-mail ou Matrícula</label>
                <input type="email" id="email" required placeholder="exemplo@escola.com">
            </div>

            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" required placeholder="Digite sua senha">
            </div>

            <div class="input-group user-type">
                <label>Acessar como:</label>
                <div class="radio-group">
                    <label><input type="radio" name="userType" value="aluno" checked> Aluno</label>
                    <label><input type="radio" name="userType" value="responsavel"> Responsável</label>
                </div>
            </div>

            <button type="submit" class="btn-login">Entrar no Sistema</button>
        </form>
        <div id="message" class="message"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
