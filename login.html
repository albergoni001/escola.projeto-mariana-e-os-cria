<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mente Organizada - Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f3f7f5;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-logo {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        .login-container h1 {
            color: #0b3c5d;
            font-size: 1.8rem;
            margin-bottom: 8px;
        }
        .login-container p {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        .input-group {
            text-align: left;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .input-group label {
            font-weight: 600;
            color: #0b3c5d;
            font-size: 0.9rem;
        }
        .input-group input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
            font-family: inherit;
            font-size: 1rem;
        }
        .input-group input:focus {
            border-color: #0b3c5d;
            outline: none;
        }
        .btn-entrar {
            width: 100%;
            background-color: #32a852; /* Nosso Verde */
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .btn-entrar:hover {
            background-color: #288441;
        }
        .error-msg {
            color: #dc2626;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-logo">📖</div>
        <h1>Mente Organizada</h1>
        <p>Faça login para acompanhar seus estudos</p>

        <form id="loginForm">
            <div class="input-group">
                <label for="username">Usuário:</label>
                <input type="text" id="username" required placeholder="Digite seu usuário">
            </div>
            
            <div class="input-group">
                <label for="password">Senha:</label>
                <input type="password" id="password" required placeholder="Digite sua senha">
            </div>

            <button type="submit" class="btn-entrar">Entrar no Painel</button>
            <div class="error-msg" id="errorMsg">Usuário ou senha incorretos!</div>
        </form>
    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const usuario = document.getElementById("username").value;
            const senha = document.getElementById("password").value;
            const errorMsg = document.getElementById("errorMsg");

            try {
                // Envia os dados para o PHP validar
                const response = await fetch("salvar.php", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ acao: "login", usuario: usuario, senha: senha })
                });

                const data = await response.json();

                if (data.status === "sucesso") {
                    // Guarda o ID do aluno logado na sessão do navegador
                    localStorage.setItem("aluno_logado", data.aluno_id);
                    // Redireciona para o painel principal
                    window.location.href = "index.html";
                } else {
                    errorMsg.style.display = "block";
                    errorMsg.innerText = data.mensagem;
                }
            } catch (error) {
                console.error("Erro ao tentar logar:", error);
                errorMsg.style.display = "block";
                errorMsg.innerText = "Erro ao conectar ao servidor.";
            }
        });
    </script>
</body>
</html>
