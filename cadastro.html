<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenteOrganizada - Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="logo-container">
            <div class="logo-icon">📝</div>
            <h1>Criar Conta</h1>
            <p class="school-tag">CEEP Cleuza Eleuza Maria</p>
        </div>

        <form id="cadastroForm">
            <div class="input-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" required placeholder="Digite seu nome completo">
            </div>

            <div class="input-group">
                <label for="emailCadastro">E-mail</label>
                <input type="email" id="emailCadastro" required placeholder="exemplo@escola.com">
            </div>

            <div class="input-group">
                <label for="passwordCadastro">Senha</label>
                <input type="password" id="passwordCadastro" required placeholder="Crie uma senha segura">
            </div>

            <div class="input-group">
                <label for="confirmPassword">Confirmar Senha</label>
                <input type="password" id="confirmPassword" required placeholder="Repita a senha">
            </div>

            <div class="input-group user-type">
                <label>Cadastrar como:</label>
                <div class="radio-group">
                    <label><input type="radio" name="userTypeCadastro" value="aluno" checked> Aluno</label>
                    <label><input type="radio" name="userTypeCadastro" value="responsavel"> Responsável</label>
                </div>
            </div>

            <button type="submit" class="btn-login">Finalizar Cadastro</button>
        </form>
        
        <div id="messageCadastro" class="message"></div>
        
        <p class="switch-form">Já tem uma conta? <a href="index.html">Faça login</a></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
